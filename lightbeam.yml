data_dir: .\output
namespace: ed-fi
namespace_overrides:
  tpdm:
    - candidates
edfi_api:
  base_url: http://localhost:54746
  #oauth_url: http://localhost:54746/oauth/token
  #dependencies_url: http://localhost:54746/metadata/data/v3/dependencies
  # open_api_metadata_url: http://localhost:54746/metadata/xsd
  descriptors_swagger_url: http://localhost:54746/metadata/data/v3/descriptors/swagger.json
  resources_swagger_url: http://localhost:54746/metadata/data/v3/resources/swagger.json
  version: 3
  mode: sandbox
 # year: 2021
  client_id: 7AnDGLk3TCajcrweRFoJ4
  client_secret: ONtI8xn51ZPoG7Du9MkKL
connection:
  pool_size: 8
  timeout: 60
  num_retries: 10
  backoff_factor: 1.5
  retry_statuses: [429, 500, 502, 503, 504]
  verify_ssl: True
count:
  separator: ","
fetch:
  page_size: 100
validate:
  methods:
    - schema # checks that payloads conform to the Swagger definitions from the API
    - descriptors # checks that descriptor values are either locally-defined or exist in the remote API
    - uniqueness # checks that local payloads are unique by the required property values
    - references # checks that references resolve, either locally or in the remote API
  # or `methods: "*"`
  references:
    selector:
      - studentAssessments.studentReference
      - studentSchoolAssociations.schoolReference
    behavior: exclude # or `include`
    remote: False # default=True
force_delete: True
log_level: DEBUG
show_stacktrace: True