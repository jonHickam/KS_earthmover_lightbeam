version: 2

config:
  output_dir: ./output/

sources:
  calendar:
    file: ./samples/CalendarTypeGradeLevels.csv
    header_rows: 1
    
  calendarDate:
    file: ./samples/CalendarDateAndEvent.csv
    header_rows: 1

  courseOffering:
    file: ./samples/CourseOfferings.csv
    header_rows: 1
  

destinations:
  calendar:
    source: $sources.calendar
    template: ./templates/calendars.jsont
    extension: jsonl
    linearize: True
 
  calendarDate:
    source: $sources.calendarDate
    template: ./templates/calendarDates.jsont
    extension: jsonl
    linearize: True

  courseOffering:
    source: $sources.courseOffering
    template: ./templates/courseOfferings.jsont
    extension: jsonls
    linearize: True

  section:
    source: $sources.courseOffering
    template: ./templates/sections.jsont
    extension: jsonl
    linearize: True
  
